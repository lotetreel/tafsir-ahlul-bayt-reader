# This file configures live Firebase Hosting deploys on pushes to main.

name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
    paths:
      - ".nojekyll"
      - "app.js"
      - "index.html"
      - "styles.css"
      - "data/**"
      - "firebase.json"
      - ".firebaserc"
      - "scripts/prepare-hosting.js"
      - ".github/workflows/firebase-hosting-pull-request.yml"
      - ".github/workflows/firebase-hosting-merge.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: node scripts/prepare-hosting.js

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIZAN_AL_HIKMAH }}
          projectId: mizan-al-hikmah
          channelId: live
          target: reader
